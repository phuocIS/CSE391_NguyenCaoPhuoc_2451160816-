<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexbox Layout</title>
    <link rel="stylesheet" href="flexbox.css" />
  </head>
  <body>
    <!-- Phần 1: Navbar -->
    <nav class="navbar">
      <a href="#" class="navbar__logo">LOGO</a>

      <ul class="navbar__menu">
        <li><a href="#">Home</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">About</a></li>
      </ul>

      <div class="navbar__auth">
        <a href="#" class="btn-login">Login</a>
        <a href="#" class="btn-register">Register</a>
      </div>
    </nav>

    <!-- Phần 2: Product Cards Grid -->
    <section class="section">
      <div class="card-grid">
        <div class="card">
          <div class="card__img">📱</div>
          <div class="card__body">
            <div class="card__name">iPhone 15 Pro</div>
            <div class="card__price">28.990.000đ</div>
            <div class="card__btn"><button>Mua ngay</button></div>
          </div>
        </div>

        <div class="card">
          <div class="card__img">💻</div>
          <div class="card__body">
            <div class="card__name">MacBook Air M3</div>
            <div class="card__price">32.990.000đ</div>
            <div class="card__btn"><button>Mua ngay</button></div>
          </div>
        </div>

        <div class="card">
          <div class="card__img">🎧</div>
          <div class="card__body">
            <div class="card__name">AirPods Pro</div>
            <div class="card__price">6.490.000đ</div>
            <div class="card__btn"><button>Mua ngay</button></div>
          </div>
        </div>

        <div class="card">
          <div class="card__img">⌚</div>
          <div class="card__body">
            <div class="card__name">Apple Watch S9</div>
            <div class="card__price">11.990.000đ</div>
            <div class="card__btn"><button>Mua ngay</button></div>
          </div>
        </div>

        <div class="card">
          <div class="card__img">📷</div>
          <div class="card__body">
            <div class="card__name">Sony A7 IV</div>
            <div class="card__price">68.000.000đ</div>
            <div class="card__btn"><button>Mua ngay</button></div>
          </div>
        </div>

        <div class="card">
          <div class="card__img">🖥️</div>
          <div class="card__body">
            <div class="card__name">Dell Monitor 27"</div>
            <div class="card__price">8.500.000đ</div>
            <div class="card__btn"><button>Mua ngay</button></div>
          </div>
        </div>

        <div class="card">
          <div class="card__img">🖱️</div>
          <div class="card__body">
            <div class="card__name">Logitech MX Master</div>
            <div class="card__price">2.200.000đ</div>
            <div class="card__btn"><button>Mua ngay</button></div>
          </div>
        </div>

        <div class="card">
          <div class="card__img">⌨️</div>
          <div class="card__body">
            <div class="card__name">Keychron K2 Pro</div>
            <div class="card__price">3.100.000đ</div>
            <div class="card__btn"><button>Mua ngay</button></div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
