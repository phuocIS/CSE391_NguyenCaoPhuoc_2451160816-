<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Animations</title>
    <link rel="stylesheet" href="animations.css" />
  </head>
  <body>
    <h1 class="page-title">CSS Animations</h1>

    <div class="product-grid">
      <div class="product-card fade-in">
        <div class="product-card__image-wrapper">
          <img src="https://picsum.photos/seed/anim1/400/400" alt="iPhone 15" class="product-card__image" />
        </div>
        <div class="product-card__body">
          <h3 class="product-card__title">iPhone 15 Pro Max</h3>
          <p class="product-card__price">34.990.000đ</p>
          <button class="btn">Mua ngay</button>
        </div>
      </div>

      <div class="product-card fade-in">
        <div class="product-card__image-wrapper">
          <img src="https://picsum.photos/seed/anim2/400/400" alt="Samsung Galaxy" class="product-card__image" />
        </div>
        <div class="product-card__body">
          <h3 class="product-card__title">Samsung Galaxy S24</h3>
          <p class="product-card__price">28.990.000đ</p>
          <button class="btn">Mua ngay</button>
        </div>
      </div>

      <div class="product-card fade-in">
        <div class="product-card__image-wrapper">
          <img src="https://picsum.photos/seed/anim3/400/400" alt="MacBook Air" class="product-card__image" />
        </div>
        <div class="product-card__body">
          <h3 class="product-card__title">MacBook Air M3</h3>
          <p class="product-card__price">27.990.000đ</p>
          <button class="btn">Mua ngay</button>
        </div>
      </div>

      <div class="product-card fade-in">
        <div class="product-card__image-wrapper">
          <img src="https://picsum.photos/seed/anim4/400/400" alt="iPad Pro" class="product-card__image" />
        </div>
        <div class="product-card__body">
          <h3 class="product-card__title">iPad Pro 12.9"</h3>
          <p class="product-card__price">24.990.000đ</p>
          <button class="btn">Mua ngay</button>
        </div>
      </div>
    </div>

    <div class="spinner-section">
      <h2>Loading Spinner</h2>
      <div class="spinner"></div>
    </div>

    <div class="fade-in-section">
      <h2 class="fade-in">Nội dung xuất hiện mượt mà</h2>
    </div>
  </body>
</html>
