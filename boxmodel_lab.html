<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Box Model Lab</title>
    <link rel="stylesheet" href="boxmodel.css" />
  </head>
  <body>
    <h2>Phần 1: Content-box vs Border-box</h2>

    <div class="container">
      <div class="box content-box">Content-box</div>
      <div class="box border-box">Border-box</div>
    </div>
    <h2>Phần 2: Layout 3 cột</h2>
    <h3>TH1 - Có dùng border-box</h3>
    <div class="layout">
      <div class="sidebar">Sidebar</div>
      <div class="content">Content</div>
      <div class="ads">Ads</div>
    </div>

    <h3>TH2 - Không dùng border-box</h3>
    <div class="layout-broken">
      <div class="sidebar">Sidebar</div>
      <div class="content">Content</div>
      <div class="ads">Ads</div>
    </div>
  </body>
</html>
